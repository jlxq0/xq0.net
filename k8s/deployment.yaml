apiVersion: apps/v1
kind: Deployment
metadata:
  name: lindner-web
  namespace: web
  labels:
    app: lindner-web
spec:
  replicas: 2
  minReadySeconds: 5
  selector:
    matchLabels:
      app: lindner-web
  template:
    metadata:
      labels:
        app: lindner-web
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: forge-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # replicas on distinct nodes — a single node loss can't take both down
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: lindner-web
      containers:
        - name: caddy
          # CI self-bumps this to :<sha> on push (see .forgejo/workflows/docker.yaml)
          image: forge.oddie.app/jlxq0/lindner_web:e432ee4
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 64Mi }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
